<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Workout Tracker</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --ios-blue: #0A84FF;
            --ios-bg: #000000;
            --ios-card: #1C1C1E;
            --ios-card-alt: #262629;
            --ios-text: #FFFFFF;
            --ios-secondary-text: #8E8E93;
            --ios-border: #38383A;
            --ios-green-soft: rgba(48, 209, 88, 0.15);
            --ios-yellow-soft: rgba(255, 214, 10, 0.2);
            --ios-red: #FF453A;
            --ios-red-glow: rgba(255, 69, 58, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            padding: 20px;
            margin: 0;
            padding-top: calc(env(safe-area-inset-top) + 10px);
            -webkit-font-smoothing: antialiased;
        }

        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .header h1 { font-size: 34px; font-weight: 700; margin: 0; }
        .header-info { text-align: right; }
        .date-full { font-size: 15px; color: var(--ios-blue); text-transform: capitalize; display: block; font-weight: 600; }

        .nav-tabs { display: flex; background: #1C1C1E; padding: 2px; border-radius: 10px; margin-bottom: 25px; }
        .tab { flex: 1; padding: 10px; text-align: center; font-size: 13px; font-weight: 600; border-radius: 8px; color: var(--ios-secondary-text); }
        .tab.active { background: #3A3A3C; color: white; }

        .table-container { background: var(--ios-card); border-radius: 12px; overflow: hidden; margin-bottom: 25px; border: 1px solid var(--ios-border); }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #2C2C2E; color: var(--ios-secondary-text); padding: 10px 5px; font-size: 9px; text-transform: uppercase; border-bottom: 1px solid var(--ios-border); }
        
        /* EFFETTO ZEBRA E RIGHE */
        td { padding: 12px 5px; border-bottom: 0.5px solid var(--ios-border); text-align: center; min-height: 45px; }
        tr:nth-child(even) { background-color: var(--ios-card-alt); }
        
        .today-row { 
            background-color: var(--ios-red-glow) !important;
            outline: 2px solid var(--ios-red);
            outline-offset: -2px;
            position: relative;
            z-index: 1;
        }

        .weekend-row { background-color: var(--ios-green-soft) !important; }
        .col-stats { background-color: var(--ios-yellow-soft); font-weight: 600; color: #FFD60A; min-width: 45px; }
        .col-left { text-align: left; padding-left: 12px; text-transform: lowercase; width: 35%; }
        .col-left::first-letter { text-transform: uppercase; }
        
        .dot-cell { font-size: 18px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        
        .card { background: var(--ios-card); border-radius: 12px; padding: 0 16px; margin-bottom: 20px; }
        .input-row { display: flex; justify-content: space-between; align-items: center; min-height: 50px; border-bottom: 0.5px solid var(--ios-border); }
        input, select { background: transparent; border: none; color: var(--ios-blue); font-size: 17px; text-align: right; outline: none; }
        
        .btn-main { background: var(--ios-blue); color: white; border-radius: 12px; padding: 16px; font-size: 17px; font-weight: 600; border: none; width: 100%; margin-top: 10px; }
        .btn-export { background: var(--ios-red); color: white; border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 600; border: none; width: 100%; margin: 20px 0; }

        .hidden { display: none !important; }
        .section-title { font-size: 13px; color: var(--ios-secondary-text); text-transform: uppercase; margin: 20px 0 8px 16px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Matteo</h1>
        <div class="header-info">
            <span id="date-full" class="date-full"></span>
            <span id="week-num" style="font-size: 12px; color: var(--ios-secondary-text);"></span>
        </div>
    </div>

    <div class="nav-tabs">
        <div class="tab active" onclick="switchTab('input')">Registra</div>
        <div class="tab" onclick="switchTab('plan')">Programma</div>
        <div class="tab" onclick="switchTab('stats')">Storico</div>
    </div>

    <div id="view-input">
        <div class="card">
            <div class="input-row"><label>Data</label><input type="date" id="data_rif"></div>
            <div class="input-row"><label>Palestra</label><select id="palestra"><option value="NO">No</option><option value="SI">Sì</option></select></div>
            <div class="input-row"><label>Corsa</label><select id="corsa" onchange="toggleCorsa()"><option value="NO">No</option><option value="SI">Sì</option></select></div>
            <div id="corsa-flow" class="hidden">
                <div class="input-row"><label>Tipo</label><select id="tipo_corsa" onchange="toggleKM()"><option value="" selected disabled>Scegli...</option><option value="Lento">Lento</option><option value="Reps">Reps</option></select></div>
                <div id="corsa-dati" class="hidden">
                    <div class="input-row"><label>KM</label><input type="number" id="km_percorsi" step="0.1" inputmode="decimal" placeholder="0.0"></div>
                    <div class="input-row"><label>D+ (m)</label><input type="number" id="d_plus" inputmode="numeric" placeholder="0"></div>
                </div>
            </div>
        </div>
        <button id="btn-salva-main" class="btn-main" onclick="salva('real')">Salva Sessione</button>
    </div>

    <div id="view-plan" class="hidden">
        <div id="plan-container"></div>
    </div>

    <div id="view-stats" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; padding:0 10px;">
            <select id="year-filter" onchange="aggiornaTutto()" style="color:var(--ios-blue); font-weight:700;"></select>
            <select id="week-filter" onchange="renderSettimanale()" style="color:var(--ios-blue); font-weight:700;"></select>
        </div>
        <div class="table-container">
            <table>
                <thead><tr><th style="text-align:left;padding-left:12px;">Giorno</th><th>Pal</th><th>Len</th><th>Rep</th><th class="col-stats">KM</th><th class="col-stats">D+</th></tr></thead>
                <tbody id="log-body"></tbody>
                <tfoot id="log-foot"></tfoot>
            </table>
        </div>
        <div class="section-title">Riepilogo Annuale</div>
        <div class="table-container" style="max-height: 300px; overflow-y: auto;">
            <table>
                <thead><tr><th style="text-align:left;padding-left:12px;">Settimana</th><th class="col-stats">Tot KM</th><th class="col-stats">Tot D+</th></tr></thead>
                <tbody id="year-summary-body"></tbody>
            </table>
        </div>
        <button class="btn-export" onclick="exportToExcel()">Esporta per Excel (CSV)</button>
    </div>

    <script>
        const DB_KEY = 'fitness_v20';
        const PLAN_DB_KEY = 'plan_v20';
        const oggi = new Date();
        const oggiIso = oggi.toISOString().split('T')[0];
        const weekCorrente = getWeekNumber(oggi);

        function getWeekNumber(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
            var yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
            return Math.ceil((((d - yearStart) / 86400000) + 1)/7);
        }

        function formatDataEstesa(dateObj) {
            return dateObj.toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long' });
        }

        document.getElementById('data_rif').valueAsDate = oggi;
        document.getElementById('date-full').innerText = formatDataEstesa(oggi);
        document.getElementById('week-num').innerText = "Settimana " + weekCorrente;

        const yFilter = document.getElementById('year-filter');
        const wFilter = document.getElementById('week-filter');
        for(let i=0; i<3; i++) yFilter.innerHTML += `<option value="${oggi.getFullYear()-i}">${oggi.getFullYear()-i}</option>`;
        for(let i=1; i<=53; i++) wFilter.innerHTML += `<option value="${i}" ${i===weekCorrente?'selected':''}>Settimana ${i}</option>`;

        function toggleCorsa() {
            document.getElementById('corsa-flow').classList.toggle('hidden', document.getElementById('corsa').value === 'NO');
            toggleKM();
        }
        function toggleKM() {
            document.getElementById('corsa-dati').classList.toggle('hidden', document.getElementById('corsa').value === 'NO' || document.getElementById('tipo_corsa').value === "");
        }

        function switchTab(tab) {
            document.getElementById('view-input').classList.toggle('hidden', tab !== 'input');
            document.getElementById('view-plan').classList.toggle('hidden', tab !== 'plan');
            document.getElementById('view-stats').classList.toggle('hidden', tab !== 'stats');
            document.querySelectorAll('.tab').forEach((t, i) => {
                const labels = ['reg', 'pla', 'sta'];
                t.classList.toggle('active', labels[i] === tab.substring(0,3));
            });
            if(tab === 'stats') aggiornaTutto();
            if(tab === 'plan') renderProgramma();
        }

        function salva(type, customData = null) {
            const dataVal = customData ? customData.data : document.getElementById('data_rif').value;
            const key = type === 'real' ? DB_KEY : PLAN_DB_KEY;
            let db = JSON.parse(localStorage.getItem(key) || "[]");
            const idx = db.findIndex(r => r.data === dataVal);
            if(type === 'real' && idx !== -1 && !confirm("Sovrascrivere?")) return;
            if(idx !== -1) db.splice(idx, 1);
            
            let entry = customData || {
                data: dataVal, pal: document.getElementById('palestra').value,
                cor: document.getElementById('corsa').value,
                tipo: document.getElementById('corsa').value === "SI" ? document.getElementById('tipo_corsa').value : "-",
                km: parseFloat(document.getElementById('km_percorsi').value || 0),
                dplus: parseInt(document.getElementById('d_plus').value || 0),
                year: new Date(dataVal).getFullYear(), week: getWeekNumber(new Date(dataVal))
            };
            db.push(entry);
            localStorage.setItem(key, JSON.stringify(db));
            if(type === 'real') {
                const btn = document.getElementById('btn-salva-main');
                btn.innerText = "✓ Salvato"; btn.style.background = "#30D158";
                setTimeout(() => { btn.innerText = "Salva Sessione"; btn.style.background = "var(--ios-blue)"; }, 1500);
            }
        }

        function renderProgramma() {
            const container = document.getElementById('plan-container');
            container.innerHTML = "";
            const planDb = JSON.parse(localStorage.getItem(PLAN_DB_KEY) || "[]");
            for(let wOffset = -1; wOffset <= 3; wOffset++) {
                let d = new Date();
                let dayNum = d.getDay() || 7;
                d.setDate(d.getDate() - (dayNum - 1) + (wOffset * 7));
                let html = `<div class="section-title">${wOffset === 0 ? 'In corso' : (wOffset === -1 ? 'Scorsa' : 'Futura')} (W${getWeekNumber(d)})</div>`;
                html += `<div class="table-container"><table><thead><tr><th style="text-align:left;padding-left:12px;">Giorno</th><th>Pal</th><th>Len</th><th>Rep</th><th class="col-stats">KM</th><th class="col-stats">D+</th></tr></thead><tbody>`;
                for(let i=0; i<7; i++) {
                    let c = new Date(d); c.setDate(d.getDate() + i);
                    const iso = c.toISOString().split('T')[0];
                    const r = planDb.find(rec => rec.data === iso) || { data: iso, pal: "NO", tipo: "-", km: 0, dplus: 0 };
                    html += `<tr class="${i >= 5 ? 'weekend-row' : ''} ${iso === oggiIso ? 'today-row' : ''}">
                        <td class="col-left"><strong>${formatDataEstesa(c)}</strong></td>
                        <td class="dot-cell" onclick="togglePlanCell('${iso}', 'pal')">${r.pal==='SI'?'●':''}</td>
                        <td class="dot-cell" onclick="togglePlanCell('${iso}', 'Lento')">${r.tipo==='Lento'?'●':''}</td>
                        <td class="dot-cell" onclick="togglePlanCell('${iso}', 'Reps')">${r.tipo==='Reps'?'●':''}</td>
                        <td class="col-stats" onclick="editPlanValue('${iso}', 'km')">${r.km > 0 ? r.km.toFixed(1) : ''}</td>
                        <td class="col-stats" onclick="editPlanValue('${iso}', 'dplus')">${r.dplus > 0 ? r.dplus : ''}</td>
                    </tr>`;
                }
                html += `</tbody></table></div>`;
                container.innerHTML += html;
            }
        }

        function togglePlanCell(iso, field) {
            let db = JSON.parse(localStorage.getItem(PLAN_DB_KEY) || "[]");
            let idx = db.findIndex(r => r.data === iso);
            let r = idx !== -1 ? db[idx] : { data: iso, pal: "NO", tipo: "-", km: 0, dplus: 0, year: new Date(iso).getFullYear(), week: getWeekNumber(new Date(iso)) };
            if(field === 'pal') r.pal = r.pal === 'SI' ? 'NO' : 'SI';
            else if(field === 'Lento' || field === 'Reps') r.tipo = r.tipo === field ? '-' : field;
            if(idx !== -1) db[idx] = r; else db.push(r);
            localStorage.setItem(PLAN_DB_KEY, JSON.stringify(db));
            renderProgramma();
        }

        function editPlanValue(iso, field) {
            let db = JSON.parse(localStorage.getItem(PLAN_DB_KEY) || "[]");
            let idx = db.findIndex(r => r.data === iso);
            let r = idx !== -1 ? db[idx] : { data: iso, pal: "NO", tipo: "-", km: 0, dplus: 0, year: new Date(iso).getFullYear(), week: getWeekNumber(new Date(iso)) };
            let val = prompt(field === 'km' ? "KM:" : "D+:");
            if(val !== null) {
                if(field === 'km') r.km = parseFloat(val.replace(',', '.') || 0);
                else r.dplus = parseInt(val || 0);
                if(idx !== -1) db[idx] = r; else db.push(r);
                localStorage.setItem(PLAN_DB_KEY, JSON.stringify(db));
                renderProgramma();
            }
        }

        function aggiornaTutto() { renderSettimanale(); renderAnnuale(); }
        function renderSettimanale() {
            const targetY = parseInt(document.getElementById('year-filter').value);
            const targetW = parseInt(document.getElementById('week-filter').value);
            const db = JSON.parse(localStorage.getItem(DB_KEY) || "[]");
            const tbody = document.getElementById('log-body');
            tbody.innerHTML = "";
            let tk=0, td=0;
            let d = new Date(targetY, 0, 1);
            let dayNum = d.getDay() || 7;
            d.setDate(d.getDate() + (targetW - 1) * 7 - (dayNum - 1));
            for (let i = 0; i < 7; i++) {
                let c = new Date(d); c.setDate(d.getDate() + i);
                const iso = c.toISOString().split('T')[0];
                const r = db.find(rec => rec.data === iso);
                if(r){ tk+=r.km; td+=r.dplus; }
                tbody.innerHTML += `<tr class="${i >= 5 ? 'weekend-row' : ''} ${iso === oggiIso ? 'today-row' : ''}">
                    <td class="col-left"><strong>${formatDataEstesa(c)}</strong></td>
                    <td>${r?.pal==='SI'?'●':''}</td><td>${r?.tipo==='Lento'?'●':''}</td><td>${r?.tipo==='Reps'?'●':''}</td>
                    <td class="col-stats">${r?.km ? r.km.toFixed(1) : ''}</td><td class="col-stats">${r?.dplus||''}</td>
                </tr>`;
            }
            document.getElementById('log-foot').innerHTML = `<tr class="row-total" style="background:#2C2C2E;"><td class="col-left">TOTALI</td><td></td><td></td><td></td><td class="col-stats" style="background:#FFD60A; color:black;">${tk.toFixed(1)}</td><td class="col-stats" style="background:#FFD60A; color:black;">${td}</td></tr>`;
        }

        function renderAnnuale() {
            const targetY = parseInt(document.getElementById('year-filter').value);
            const db = JSON.parse(localStorage.getItem(DB_KEY) || "[]");
            const tbody = document.getElementById('year-summary-body');
            tbody.innerHTML = "";
            const currYear = oggi.getFullYear();

            for (let w = 1; w <= 53; w++) {
                const data = db.filter(r => r.year === targetY && r.week === w);
                const k = data.reduce((a, c) => a + c.km, 0);
                const d = data.reduce((a, c) => a + c.dplus, 0);
                const isThisWeek = (targetY === currYear && w === weekCorrente);
                
                tbody.innerHTML += `<tr class="${isThisWeek ? 'today-row' : ''}">
                    <td class="col-left">Settimana ${w}</td>
                    <td class="col-stats">${k > 0 ? k.toFixed(1) + ' km' : '-'}</td>
                    <td class="col-stats">${d > 0 ? d + ' m' : '-'}</td>
                </tr>`;
            }
        }

        function exportToExcel() {
            const db = JSON.parse(localStorage.getItem(DB_KEY) || "[]");
            if(db.length === 0) return;
            db.sort((a, b) => new Date(a.data) - new Date(b.data));
            let csv = "Data,Palestra,Lento,Reps,KM,D+\n";
            db.forEach(r => {
                csv += `${new Date(r.data).toLocaleDateString('it-IT')},${r.pal},${r.tipo==='Lento'?'SI':'NO'},${r.tipo==='Reps'?'SI':'NO'},${r.km.toString().replace('.', ',')},${r.dplus}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `workout_matteo.csv`;
            link.click();
        }
    </script>
</body>
</html>
