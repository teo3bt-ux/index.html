<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Workout Tracker</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --ios-blue: #0A84FF;
            --ios-bg: #000000;
            --ios-card: #1C1C1E;
            --ios-text: #FFFFFF;
            --ios-secondary-text: #8E8E93;
            --ios-border: #38383A;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            padding: 20px;
            margin: 0;
            padding-top: env(safe-area-inset-top);
            -webkit-font-smoothing: antialiased;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 25px;
        }
        .header h1 { font-size: 34px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
        .header-info { text-align: right; margin-top: 5px; }
        .date-full { font-size: 15px; color: var(--ios-text); text-transform: capitalize; display: block; font-weight: 500; }
        .week-num { font-size: 13px; color: var(--ios-secondary-text); }

        /* NAV TABS */
        .nav-tabs {
            display: flex;
            background: #1C1C1E;
            padding: 2px;
            border-radius: 10px;
            margin-bottom: 25px;
        }
        .tab {
            flex: 1;
            padding: 8px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            border-radius: 8px;
            color: var(--ios-secondary-text);
            transition: all 0.2s;
        }
        .tab.active {
            background: #3A3A3C;
            color: white;
        }

        /* CARDS & INPUTS */
        .card { background: var(--ios-card); border-radius: 12px; padding: 0 16px; margin-bottom: 20px; }
        .input-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 48px;
            border-bottom: 0.5px solid var(--ios-border);
        }
        .input-row:last-child { border-bottom: none; }
        label { font-size: 17px; }
        input, select {
            background: transparent;
            border: none;
            color: var(--ios-blue);
            font-size: 17px;
            text-align: right;
            outline: none;
            font-family: inherit;
        }

        .btn-main {
            background: var(--ios-blue);
            color: white;
            border-radius: 12px;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            border: none;
            width: 100%;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-main:active { opacity: 0.8; }

        /* TABELLA STORICO */
        .table-container { background: var(--ios-card); border-radius: 12px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: center; }
        th { background: #2C2C2E; color: var(--ios-secondary-text); padding: 10px 5px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 12px 5px; border-bottom: 0.5px solid var(--ios-border); }
        .col-day { text-align: left; padding-left: 12px; color: var(--ios-secondary-text); }
        .dot { font-size: 18px; color: var(--ios-text); }

        .hidden { display: none; }
        .section-title { font-size: 13px; color: var(--ios-secondary-text); text-transform: uppercase; margin: 0 0 8px 16px; font-weight: 500; }

        .filter-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding: 0 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Matteo</h1>
        <div class="header-info">
            <span id="date-full" class="date-full"></span>
            <span id="week-num" class="week-num"></span>
        </div>
    </div>

    <div class="nav-tabs">
        <div class="tab active" onclick="switchTab('input')">Registra</div>
        <div class="tab" onclick="switchTab('stats')">Storico</div>
    </div>

    <div id="view-input">
        <div class="section-title">Nuovo Allenamento</div>
        <div class="card">
            <div class="input-row"><label>Data</label><input type="date" id="data_rif"></div>
            <div class="input-row"><label>Palestra</label><select id="palestra"><option value="NO">No</option><option value="SI">Sì</option></select></div>
            <div class="input-row"><label>Corsa</label><select id="corsa" onchange="aggiornaCampi()"><option value="NO">No</option><option value="SI">Sì</option></select></div>
            <div id="extra-corsa" class="hidden">
                <div class="input-row"><label>Tipo</label><select id="tipo_corsa" onchange="aggiornaCampi()"><option value="" disabled selected>Scegli...</option><option value="Lento">Lento</option><option value="Reps">Reps</option></select></div>
                <div id="dati-corsa" class="hidden">
                    <div class="input-row"><label>KM</label><input type="number" id="km_percorsi" step="0.01" inputmode="decimal" placeholder="0.00"></div>
                    <div class="input-row"><label>D+ (m)</label><input type="number" id="d_plus" inputmode="numeric" placeholder="0"></div>
                </div>
            </div>
        </div>
        <button class="btn-main" onclick="salva()">Salva Sessione</button>
    </div>

    <div id="view-stats" class="hidden">
        <div class="filter-row">
