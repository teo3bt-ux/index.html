<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Workout Tracker</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --ios-blue: #0A84FF;
            --ios-bg: #000000;
            --ios-card: #1C1C1E;
            --ios-text: #FFFFFF;
            --ios-secondary-text: #8E8E93;
            --ios-border: #38383A;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            padding: 20px;
            margin: 0;
            padding-top: env(safe-area-inset-top);
            -webkit-font-smoothing: antialiased;
        }

        /* HEADER MINIMAL */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-top: 10px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .card {
            background: var(--ios-card);
            border-radius: 14px;
            padding: 0 16px;
            margin-bottom: 20px;
        }

        .input-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 50px;
            border-bottom: 0.5px solid var(--ios-border);
        }

        .input-row:last-child {
            border-bottom: none;
        }

        label {
            font-size: 17px;
            font-weight: 400;
        }

        input, select {
            background: transparent;
            border: none;
            color: var(--ios-blue);
            font-size: 17px;
            text-align: right;
            outline: none;
            padding: 10px 0;
            font-family: inherit;
        }

        /* STILE BOTTONI iOS */
        .btn-main {
            background: var(--ios-blue);
            color: white;
            border-radius: 12px;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            border: none;
            width: 100%;
            margin-top: 10px;
            transition: opacity 0.2s;
        }

        .btn-main:active { opacity: 0.7; }

        .btn-ghost {
            color: var(--ios-blue);
            background: transparent;
            font-size: 15px;
            border: none;
            width: 100%;
            margin-top: 20px;
            font-weight: 400;
        }

        /* GRAFICO */
        .chart-container {
            background: var(--ios-card);
            border-radius: 14px;
            padding: 16px;
            margin-top: 10px;
        }

        .hidden { display: none; }

        .section-title {
            font-size: 13px;
            color: var(--ios-secondary-text);
            text-transform: uppercase;
            margin: 0 0 8px 16px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Riepilogo</h1>
        <span id="current-date" style="color: var(--ios-secondary-text); font-size: 15px;"></span>
    </div>

    <div class="section-title">Nuova Voce</div>
    <div class="card">
        <div class="input-row">
            <label>Data</label>
            <input type="date" id="data_rif">
        </div>

        <div class="input-row">
            <label>Palestra</label>
            <select id="palestra">
                <option value="NO">No</option>
                <option value="SI">Sì</option>
            </select>
        </div>

        <div class="input-row">
            <label>Corsa</label>
            <select id="corsa" onchange="aggiornaInterfaccia()">
                <option value="NO">No</option>
                <option value="SI">Sì</option>
            </select>
        </div>

        <div id="extra-corsa" class="hidden">
            <div class="input-row">
                <label>Tipo</label>
                <select id="tipo_corsa" onchange="aggiornaInterfaccia()">
                    <option value="" disabled selected>Scegli...</option>
                    <option value="Lento">Lento</option>
                    <option value="Reps">Reps</option>
                </select>
            </div>
            <div id="dati-corsa" class="hidden">
                <div class="input-row">
                    <label>Distanza (KM)</label>
                    <input type="number" id="km_percorsi" step="0.01" inputmode="decimal" placeholder="0.00">
                </div>
                <div class="input-row">
                    <label>D+ (Metri)</label>
                    <input type="number" id="d_plus" inputmode="numeric" placeholder="0">
                </div>
            </div>
        </div>
    </div>

    <button class="btn-main" onclick="salva()">Registra Sessione</button>

    <div style="margin-top: 30px;" class="section-title">Analisi Ultimi 7 Giorni</div>
    <div class="chart-container">
        <canvas id="chartJS"></canvas>
    </div>

    <button class="btn-ghost" onclick="esporta()">Esporta dati in CSV</button>

    <script>
        document.getElementById('data_rif').valueAsDate = new Date();
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('it-IT', {day: 'numeric', month: 'short'});
        
        let chart;

        function aggiornaInterfaccia() {
            const corsa = document.getElementById('corsa').value;
            const tipo = document.getElementById('tipo_corsa').value;
            document.getElementById('extra-corsa').className = corsa === "SI" ? "" : "hidden";
            document.getElementById('dati-corsa').className = (corsa === "SI" && tipo !== "") ? "" : "hidden";
        }

        function salva() {
            const data = document.getElementById('data_rif').value;
            const pal = document.getElementById('palestra').value;
            const cor = document.getElementById('corsa').value;
            const tipo = cor === "SI" ? document.getElementById('tipo_corsa').value : "-";
            const km = cor === "SI" ? parseFloat(document.getElementById('km_percorsi').value || 0) : 0;
            const dplus = cor === "SI" ? parseInt(document.getElementById('d_plus').value || 0) : 0;

            const record = { data, pal, cor, tipo, km: Math.round(km * 100) / 100, dplus };
            let db = JSON.parse(localStorage.getItem('fitness_pro_v1') || "[]");
            db.push(record);
            localStorage.setItem('fitness_pro_v1', JSON.stringify(db));
            
            // Animazione di feedback
            const btn = document.querySelector('.btn-main');
            btn.innerText = "Registrato!";
            btn.style.background = "#34C759";
            setTimeout(() => {
                btn.innerText = "Registra Sessione";
                btn.style.background = "var(--ios-blue)";
            }, 2000);

            renderChart();
        }

        function renderChart() {
            const db = JSON.parse(localStorage.getItem('fitness_pro_v1') || "[]").slice(-7);
            const ctx = document.getElementById('chartJS').getContext('2d');
            
            if(chart) chart.destroy();
            
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: db.map(r => r.data.split('-').reverse().slice(0,2).join('/')),
                    datasets: [{
                        label: 'KM',
                        data: db.map(r => r.km),
                        backgroundColor: '#0A84FF',
                        borderRadius: 6,
                        borderSkipped: false,
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#38383A' }, ticks: { color: '#8E8E93' } },
                        x: { grid: { display: false }, ticks: { color: '#8E8E93' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function esporta() {
            const db = JSON.parse(localStorage.getItem('fitness_pro_v1') || "[]");
            let csv = "\uFEFFData,Palestra,Corsa,Tipo,KM,D+\n";
            db.forEach(r => csv += `${r.data},${r.pal},${r.cor},${r.tipo},${r.km},${r.dplus}\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "allenamenti.csv";
            link.click();
        }

        window.onload = renderChart;
    </script>
</body>
</html>
